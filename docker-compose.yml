version: "3.9"

# ────────────────────────────────────────────────────────────────────────────
# Basketball Analytics Platform — Docker Compose
#
# Profiles:
#   dev   — api, worker-gpu, db, redis, minio, frontend (localhost:3000)
#   prod  — all services including caddy reverse proxy (TLS)
#
# Usage:
#   dev:   docker compose --profile dev up -d --build
#   prod:  docker compose --profile prod up -d --build
# ────────────────────────────────────────────────────────────────────────────

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    profiles: ["dev", "prod"]
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-basketball}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-basketball}
      POSTGRES_DB: ${POSTGRES_DB:-basketball}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-basketball}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging

  # ── Redis (Celery broker + result backend) ──────────────────────────────────
  redis:
    image: redis:7-alpine
    profiles: ["dev", "prod"]
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging

  # ── MinIO (S3-compatible object storage) ────────────────────────────────────
  minio:
    image: minio/minio:latest
    profiles: ["dev", "prod"]
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"   # MinIO S3 API (needed for browser presigned URLs)
      - "9001:9001"   # MinIO console (dev only)
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 10s
      retries: 5
    logging: *default-logging

  # ── FastAPI ─────────────────────────────────────────────────────────────────
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    profiles: ["dev", "prod"]
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      BA_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-basketball}:${POSTGRES_PASSWORD:-basketball}@db:5432/${POSTGRES_DB:-basketball}
      BA_REDIS_URL: redis://redis:6379/0
      BA_MINIO_ENDPOINT: minio:9000
      BA_MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      BA_MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      BA_SECRET_KEY: ${JWT_SECRET:-CHANGE_ME}
      BA_DEBUG: "false"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5)"]
      interval: 15s
      timeout: 10s
      retries: 5
    logging: *default-logging

  # ── GPU Worker (Celery + CUDA) ───────────────────────────────────────────────
  worker-gpu:
    build:
      context: .
      dockerfile: worker/Dockerfile
    profiles: ["dev", "prod"]
    restart: unless-stopped
    runtime: nvidia           # requires nvidia-container-toolkit on host
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      BA_DUMMY_MODELS: ${BA_DUMMY_MODELS:-false}
      BA_DEVICE: ${BA_DEVICE:-auto}
      BA_CHUNK_SIZE: "3000"
      BA_YOLO_BATCH_SIZE: "32"
      BA_YOLO_HALF: "true"            # FP16 inference (faster, less VRAM) on CUDA
      BA_COURT_KP_BATCH_SIZE: "24"    # ~10GB at imgsz 1536 (raise GPU/VRAM use; ≥32 risks OOM)
      BA_COURT_KP_SAMPLE_EVERY: "2"   # moving-camera precision: infer court frequently (follows pan)
      BA_COURT_KP_IMGSZ: "1536"       # moving/distant precision: high court keypoint resolution (more GPU/VRAM)
      BA_HOOP_PROPAGATE: "true"       # propagate hoop/backboard across all frames via camera motion (a few marks → full video)
      BA_BALL_DETECTOR_CONF: "0.15"
      BA_BALL_SAHI_TILE: "640"
      BA_BALL_SAHI_OVERLAP: "0.25"
      BA_BALL_MAX_INTERP_GAP: "15"
      BA_BALL_KALMAN: "true"
      BA_BALL_VISUAL_TRACK: "false"   # CSRT needs opencv-contrib (not installed); fine-tune is the real gray-ball fix
      BA_BALL_SAM2: "true"            # propagate manual ball clicks with SAM2 (color-agnostic)
      BA_SAM2_STRIDE: "1"             # raise (2-3) on very long videos to cut SAM2 time
      BA_POSE_TOPDOWN: "true"         # per-player crop pose → distant players keep skeletons
      BA_BALL_EXPORT_DATASET: "true"  # export SAM2 boxes as YOLO auto-labels (fine-tune corpus)
      BA_PLAYER_MAX_H: "1080"         # player detection at native res → recover distant players
      BA_PLAYER_IMGSZ: "1280"         # YOLO imgsz for players (with MAX_H) to keep distant detail
      BA_POSE_BACKEND: "yolo"
      BA_POSE_CONF_THRESHOLD: "0.3"
      BA_EVENT_POSE_CONF_THRESHOLD: "0.3"
      BA_SPEED_MAX_KMH: "25"
      BA_TRACKER: "botsort"           # BoT-SORT + camera-motion compensation (GMC) for panning video
      BA_TRACKER_LOST_BUFFER: "120"   # ByteTrack fallback: keep lost tracks ~4s
      BA_TRACKER_MIN_MATCH: "0.85"
      BA_TRACK_STITCH: "true"         # link track fragments by spatio-temporal continuity
      BA_TRACK_STITCH_MAX_GAP_S: "2.5" # aggressive: bridge longer occlusions/missed stretches
      BA_TRACK_STITCH_MAX_DIST_FRAC: "0.12"  # px/s tolerance (scales with gap length)
      BA_MIN_TRACK_SECONDS: "0.5"     # drop provisional (no-dorsal) identities seen < this
      BA_JERSEY_OCR: "true"           # OCR jersey numbers → consolidate tracks into real athletes
      BA_JERSEY_OCR_SAMPLE_EVERY: "5"
      BA_JERSEY_OCR_MIN_VOTES: "2"
      BA_PLAYER_DETECTOR_PATH: /app/engine/models/player_detector.pt
      BA_BALL_DETECTOR_PATH: /app/engine/models/ball_detector_model.pt
      BA_COURT_KEYPOINT_DETECTOR_PATH: /app/engine/models/court_keypoint_detector.pt
      BA_COURT_IMAGE_PATH: /app/engine/images/basketball_court.png
      LD_LIBRARY_PATH: "/opt/conda/lib/python3.11/site-packages/nvidia/cublas/lib:/opt/conda/lib/python3.11/site-packages/nvidia/cudnn/lib:/opt/conda/lib/python3.11/site-packages/nvidia/cufft/lib:/opt/conda/lib/python3.11/site-packages/nvidia/curand/lib:/opt/conda/lib/python3.11/site-packages/nvidia/cusolver/lib:/opt/conda/lib/python3.11/site-packages/nvidia/cusparse/lib:/opt/conda/lib/python3.11/site-packages/nvidia/cuda_runtime/lib:/opt/conda/lib/python3.11/site-packages/nvidia/nvjitlink/lib:/usr/local/nvidia/lib:/usr/local/nvidia/lib64"
      BA_DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-basketball}:${POSTGRES_PASSWORD:-basketball}@db:5432/${POSTGRES_DB:-basketball}
      BA_REDIS_URL: redis://redis:6379/0
      BA_MINIO_ENDPOINT: minio:9000
      BA_MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      BA_MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      ENGINE_PATH: /app/engine
    volumes:
      - models_data:/app/engine/models     # persist downloaded .pt models
      - stubs_data:/app/engine/stubs
      - hf_cache:/root/.cache/huggingface  # persist FashionCLIP + HF models
      - ball_dataset:/app/ball_dataset     # accumulated SAM2 auto-labels for fine-tune
      - ./basketball_analysis/output_videos:/app/host_outputs:rw
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'celery worker' > /dev/null"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging: *default-logging

  # ── Next.js Frontend ─────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    profiles: ["dev", "prod"]
    restart: unless-stopped
    ports:
      - "4000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      HOSTNAME: "0.0.0.0"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000', r => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 20s
      timeout: 10s
      retries: 5
    logging: *default-logging

  # ── Caddy Reverse Proxy ──────────────────────────────────────────────────────
  proxy:
    image: caddy:2-alpine
    profiles: ["prod"]
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
      - frontend
    logging: *default-logging

volumes:
  pg_data:
  redis_data:
  minio_data:
  models_data:
  stubs_data:
  hf_cache:
  ball_dataset:
  caddy_data:
  caddy_config:
