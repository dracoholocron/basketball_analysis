[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short
markers =
    smoke: fast import and health checks (no models)
    unit: unit tests with synthetic data (no models)
    integration: pipeline integration tests (no models, uses stubs)
    e2e: requires full running stack (docker compose up)
    live: requires live external service
